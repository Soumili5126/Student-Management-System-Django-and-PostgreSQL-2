{% extends "base.html" %}
{% block content %}

<div class="mb-4">
    <h2 class="fw-semibold mb-1" style="font-size:22px;">
        Edit Exam
    </h2>
    <p class="text-muted small mb-0">
        Update exam name, date, and total marks
    </p>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-4">

        <form method="post">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label small fw-medium">Exam Name</label>
                    <input type="text"
                           name="title"
                           class="form-control form-control-sm"
                           value="{{ exam.title }}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label small fw-medium">Date</label>
                    <input type="date"
                           name="date"
                           class="form-control form-control-sm"
                           value="{{ exam.date|date:'Y-m-d' }}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label small fw-medium">Total Marks</label>
                    <input type="number"
                           name="total_marks"
                           class="form-control form-control-sm"
                           value="{{ exam.total_marks }}"
                           min="1"
                           required>
                </div>

            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    Update Exam
                </button>

                <a href="{% url 'enter_grades' exam.id %}"
                   class="btn btn-outline-secondary btn-sm">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
